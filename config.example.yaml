# EazyClaw Configuration
# API keys should be set via environment variables, not in this file.

data_dir: /data/eazyclaw
workspace_dir: /data/eazyclaw/workspace

providers:
  default_model: "k2p5"
  kimi_coding:
    model: "k2p5"
    base_url: "https://api.kimi.com/coding/"
  # Uncomment and configure additional providers as needed:
  # moonshot:
  #   model: "kimi-k2.5"
  #   base_url: "https://api.moonshot.ai/v1"
  # anthropic:
  #   model: "claude-sonnet-4-6"
  # openai:
  #   model: "gpt-4.1"
  # gemini:
  #   model: "gemini-2.5-flash"
  # zhipu:
  #   model: "glm-4-plus"
  #   base_url: "https://open.bigmodel.cn/api/paas/v4"

channels:
  discord:
    allowed_users: []  # in allowlist mode, DMs require explicit users; guilds also need guild/channel allowlist.
    group_policy: "allowlist"  # "allowlist" or "open"
    dm:
      policy: "allow"  # "allow", "deny", or "pairing"
    guilds:
      # "123456789012345678":        # Guild/server ID
      #   require_mention: true
      #   channels:
      #     "987654321098765432":     # Channel ID
      #       allow: true
      #       require_mention: false  # Override guild-level setting

  telegram:
    allowed_users: []  # empty = allow all
    group_policy: "allowlist"  # "allowlist" or "open"
    dm:
      policy: "allow"  # "allow" or "deny"
    allowed_chats:
      # "-1001234567890":            # Chat ID (negative for groups)
      #   allow: true
      #   require_mention: true

  web:
    enabled: true
    port: 8080
    # Password is set via WEB_PASSWORD env var only

tools:
  shell:
    deny_patterns:
      - "rm -rf /"
      - "sudo"
      - "chmod 777"
    timeout: 60s
    workspace_only: true
  browser:
    headless: true

skills_dir: /data/eazyclaw/skills

heartbeat:
  enabled: false
  interval: 30m

memory:
  enabled: true
  context_max_chars: 12000
  daily_files_in_context: 2
  compaction:
    enabled: true
    trigger_messages: 80
    keep_recent_messages: 30
    summary_max_chars: 3500
    context_window_tokens: 200000  # default fallback for unknown models
    reserve_tokens_floor: 20000
    soft_threshold_tokens: 4000
    pre_flush_memory_write: true
    # Per-model context window overrides (model name → token count).
    # If a model isn't listed here, context_window_tokens (200k) is used.
    # model_context_windows:
    #   k2p5: 200000
    #   claude-sonnet-4-6: 200000
    #   gpt-4.1: 128000
    #   gemini-2.5-flash: 1048576
  background:
    enabled: true
    interval: 10m
    max_runs: 20
